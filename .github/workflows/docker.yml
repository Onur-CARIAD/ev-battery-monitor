name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t ev-battery-monitor:latest .
      - run: printf 'help\nexit\n' | docker run -i ev-battery-monitor:latest
