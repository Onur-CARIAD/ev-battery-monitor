name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t ev-battery-monitor:latest .
      - run: printf 'help\nexit\n' | docker run -i ev-battery-monitor:latest
      
      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Save image
        run: docker save ev-battery-monitor:latest -o artifacts/ev-battery-monitor.tar

      - name: Bundle compose file and instructions
        run: cp packaging/docker-compose.yml packaging/README.md artifacts/

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: artifacts/

