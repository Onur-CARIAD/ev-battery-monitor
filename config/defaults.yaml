battery:
  capacity_kwh:
    default: 77.0
    min: 20.0
    max: 200.0
    unit: kWh
    description: Usable battery capacity
  start_soc_percent:
    default: 20.0
    min: 0.0
    max: 100.0
    unit: "%"
    description: Initial state of charge
  start_temperature_celsius:
    default: 25.0
    min: -30.0
    max: 80.0
    unit: "°C"
    description: Initial battery temperature
  range_per_kwh_km:
    default: 5.0
    min: 1.0
    max: 10.0
    unit: km/kWh
    description: Estimated range per kWh
vehicle:
  max_charging_power_kw:
    default: 150.0
    min: 1.0
    max: 350.0
    unit: kW
    description: Vehicle maximum charging power
charger:
  max_power_kw:
    default: 135.0
    min: 1.0
    max: 350.0
    unit: kW
    description: Charger maximum power
session:
  target_soc_percent:
    default: 80.0
    min: 1.0
    max: 100.0
    unit: "%"
    description: Target state of charge
  cooling_threshold_celsius:
    default: 40.0
    min: 20.0
    max: 80.0
    unit: "°C"
    description: Temperature where cooling starts
  cooling_power_reduction_factor:
    default: 0.5
    min: 0.1
    max: 1.0
    unit: x
    description: Power factor while cooling
runtime:
  tick_seconds:
    default: 1.0
    unit: s
    description: Real duration of one simulation tick
  speed_factor:
    default: 60.0
    unit: x
    description: Simulated seconds per real second
  heating_factor:
    default: 0.0008
    unit: "°C/kW/Tick"
    description: Temperature increase per kW per tick
  output_soc_step_percent:
    default: 1.0
    unit: "%"
    description: SoC output step
  cooling_hysteresis_celsius:
    default: 3.0
    unit: "°C"
    description: Cooling deactivation hysteresis
